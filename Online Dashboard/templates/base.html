// Common Header here

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="main-header">
        <div class="header-left">
            <span class="header-logo">PRISM AI</span>
            <nav class="header-nav">
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('campaign') }}">Campaigns</a>
                <a href="{{ url_for('leads') }}">Leads</a>
                <a href="{{ url_for('sales') }}">Sales</a>
                <a href="{{ url_for('agent') }}">Agent</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </nav>
            <a href="{{ url_for('profile') }}" class="profile-link" style="margin-left:24px;">
                <img src="{{ url_for('static', filename='profile.png') }}" alt="Profile" class="profile-pic">
            </a>
        </div>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
