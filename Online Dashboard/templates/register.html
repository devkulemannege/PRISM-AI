<!DOCTYPE html>
<html>
<head>
    <title>Business Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <h2>Register Your Business</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Business Name" required><br>
        <input type="text" name="contact" placeholder="Contact Info" required><br>
        <input type="text" name="type" placeholder="Business Type" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Register</button>
    </form>
    <p style="text-align:center;">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
</body>
</html>
